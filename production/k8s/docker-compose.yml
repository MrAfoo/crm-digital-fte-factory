# NovaDeskAI Production Docker Compose
# Run from repo root: docker-compose -f production/k8s/docker-compose.yml up
# Or from production/k8s/: docker-compose up
services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novadesk
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novasecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../production/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d novadesk"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nova-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - nova-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - nova-network

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: nova-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - nova-network

  # NovaDeskAI API
  nova-api:
    build:
      context: ../..
      dockerfile: production/k8s/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      # Override .env values for Docker networking
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-novasecret}@postgres:5432/novadesk
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_BASE_URL: http://nova-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ../../context:/app/context
    networks:
      - nova-network
    restart: unless-stopped

  # Message Processor Worker
  nova-worker:
    build:
      context: ../..
      dockerfile: production/k8s/Dockerfile
    command: ["python", "-m", "production.workers.message_processor"]
    env_file:
      - ../../.env
    environment:
      # Override .env values for Docker networking
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-novasecret}@postgres:5432/novadesk
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../../context:/app/context
    networks:
      - nova-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  nova-network:
    driver: bridge
