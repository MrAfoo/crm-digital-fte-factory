# Kind cluster configuration for NovaDeskAI
# Usage: kind create cluster --config production/k8s/kind-cluster.yaml --name novadesk
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: novadesk
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 8000
        hostPort: 8000
        protocol: TCP
      - containerPort: 8001
        hostPort: 8001
        protocol: TCP
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
  - role: worker
  - role: worker
